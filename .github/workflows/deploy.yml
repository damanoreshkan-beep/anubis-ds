name: deploy

# tokens.json (source of truth) → dist/ → GitHub Pages
# Push to main triggers a fresh build and republishes the bundle at
# https://damanoreshkan-beep.github.io/anubis-ds/

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - run: npm ci
            # `npm run build` chains tokens → React library → playground.
            # The playground lands in dist/playground/ and gets served at
            # https://damanoreshkan-beep.github.io/anubis-ds/playground/.
            - run: npm run build
            - uses: actions/configure-pages@v5
              with:
                  enablement: true
            - uses: actions/upload-pages-artifact@v4
              with:
                  path: dist
            - uses: actions/deploy-pages@v4
